name: frontend

on:
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  push:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Generate API client (orval)
        run: npm run generate

      - name: Check generated code is up to date
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Generated code is out of date. Please run 'npm run generate' locally and commit the changes."
            git diff --stat
            exit 1
          fi

      - run: npm run lint

      - run: npm run build
